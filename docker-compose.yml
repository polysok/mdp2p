services:
  peer-zero:
    build: .
    container_name: mdp2p-peer-zero
    command: >
      python peer_zero.py
      --port 1707
      --data-dir /var/lib/mdp2p/peer_zero
      --listen-host 0.0.0.0
    ports:
      - "1707:1707"
    volumes:
      - peer_zero_data:/var/lib/mdp2p/peer_zero
    restart: unless-stopped

volumes:
  peer_zero_data:
